# For detailed configuration reference see:
# https://supabase.com/docs/guides/local-development/overview

[project]
id = "hackathon-template"

# ──────────────────────────────────────────────────────────────────────────────
# API (PostgREST)
# ──────────────────────────────────────────────────────────────────────────────
[api]
enabled = true
# Port for the local PostgREST API (Supabase REST interface)
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

# ──────────────────────────────────────────────────────────────────────────────
# Database (PostgreSQL)
# ──────────────────────────────────────────────────────────────────────────────
[db]
# Port for the local Postgres instance
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

# ──────────────────────────────────────────────────────────────────────────────
# Realtime
# ──────────────────────────────────────────────────────────────────────────────
[realtime]
enabled = true

# ──────────────────────────────────────────────────────────────────────────────
# Studio (local dashboard)
# ──────────────────────────────────────────────────────────────────────────────
[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# ──────────────────────────────────────────────────────────────────────────────
# Inbucket (local email testing — catches all outgoing emails)
# ──────────────────────────────────────────────────────────────────────────────
[inbucket]
enabled = true
port = 54324

# ──────────────────────────────────────────────────────────────────────────────
# Storage
# ──────────────────────────────────────────────────────────────────────────────
[storage]
enabled = true
file_size_limit = "50MiB"

# ──────────────────────────────────────────────────────────────────────────────
# Auth (GoTrue)
# ──────────────────────────────────────────────────────────────────────────────
[auth]
enabled = true
# The URL of your Next.js app — used as the default redirect after auth
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
# Disable confirmations in local dev so magic links work immediately via Inbucket
enable_confirmations = false
secure_password_change = false
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your code is {{ .Code }} ."

# ──────────────────────────────────────────────────────────────────────────────
# Analytics
# ──────────────────────────────────────────────────────────────────────────────
[analytics]
enabled = false
port = 54327
backend = "postgres"
