services:
  backend:
    build:
      context: ./server
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    # Automatically restart on crashes during development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3
